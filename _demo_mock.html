  // deterministic wobble (no random → stable demo)
  function gen(base,slope,amp,opts){
    opts=opts||{};var dec=opts.dec||0,freq=opts.freq||1,out=[];
    for(var i=0;i<24;i++){
      var fill = true; /* demo: every month filled so "% กรอกแล้ว" shows 100% */
      if(!fill){out.push('');continue;}
      var v=base+slope*i+Math.sin(i*1.3+base)*amp;

      if(opts.min!=null)v=Math.max(opts.min,v);if(opts.max!=null)v=Math.min(opts.max,v);

    }

    K({id:'IC-7', dept:'IC', name:'อัตราการติดเชื้อในโรงพยาบาลรวม (HAI)', unit:'%', target:'1.5', direction:'↓', frequency:3, owner:'wilai@hospital.demo', ownerName:'พว.วิไล (เดโม่)', startMonth:'', formula:'(ผู้ติดเชื้อใน รพ.) ÷ (ผู้ป่วยใน) × 100', values:gen(1.1,0,0.3,{dec:1,min:0,freq:3})}),

    K({id:'IM-9', dept:'IM', name:'เครื่องคอมพิวเตอร์มีโปรแกรมป้องกันไวรัสทำงาน', unit:'%', target:'95', direction:'↑', frequency:1, owner:'admin@hospital.demo', ownerName:'จนท.ไอที (เดโม่)', startMonth:'', formula:'(PC ที่ AV ทำงาน) ÷ (PC ทั้งหมด) × 100', values:gen(77,0.85,1.5,{dec:0,max:100,curPending:true})}),
    K({id:'IM-13',dept:'IM', name:'ระบบสารสนเทศพร้อมใช้งาน (System Uptime)', unit:'%', target:'99', direction:'↑', frequency:1, owner:'admin@hospital.demo', ownerName:'จนท.ไอที (เดโม่)', startMonth:'', formula:'(เวลาที่ระบบใช้งานได้) ÷ (เวลาทั้งหมด) × 100', values:gen(99.8,0,0.12,{dec:1,max:100})}),

    K({id:'RM-1', dept:'RM', name:'จำนวนรายงานอุบัติการณ์ความเสี่ยง (Incident Report)', unit:'ราย', target:'30', direction:'↑', frequency:1, owner:'pranee@hospital.demo', ownerName:'พว.ปราณี (เดโม่)', startMonth:'', formula:'จำนวนรายงานอุบัติการณ์ที่ส่งเข้าระบบ', values:gen(31,0.5,4,{dec:0,min:0})}),

    K({id:'HRD-2',dept:'HRD', name:'บุคลากรผ่านการอบรมช่วยฟื้นคืนชีพ (CPR/BLS)', unit:'%', target:'90', direction:'↑', frequency:6, owner:'kanya@hospital.demo', ownerName:'จนท.HRD (เดโม่)', startMonth:'', formula:'(บุคลากรผ่าน BLS) ÷ (บุคลากรทั้งหมด) × 100', values:gen(85,0.7,2,{dec:0,max:100,freq:6})}),

    K({id:'FIN-1',dept:'การเงิน', name:'อัตราส่วนทุนหมุนเวียน (Current Ratio)', unit:'เท่า', target:'1.5', direction:'↑', frequency:3, owner:'admin@hospital.demo', ownerName:'จนท.การเงิน (เดโม่)', startMonth:'', formula:'สินทรัพย์หมุนเวียน ÷ หนี้สินหมุนเวียน', values:gen(1.8,0,0.2,{dec:2,min:0,freq:3})}),

  var DEPTS=['PCT','IC','IM','RM','ENV','HRD','HPH','การเงิน'];
  function kpisForDept(d){return KPIS.filter(function(k){return k.dept===d;});}

  function evalSt(target,dir,val){
    if(val===null||val===''||val===undefined||val==='NA')return'na';
    var num=parseFloat(val);if(isNaN(num))return'na';
    var t=parseFloat((target||'').toString().replace(/[^0-9.]/g,''));if(isNaN(t))return'na';
    if(dir==='↑'||dir==='up')return num>=t?'hit':'miss';
    if(dir==='↓'||dir==='down')return num<=t?'hit':'miss';
    return'na';
  }
  function bucket(kpis,idx){
    var b={total:0,hit:0,miss:0,pending:0,na:0};
    kpis.forEach(function(k){
      b.total++;var v=k.values[idx];
      if(v==='NA')b.na++;
      else if(v===''||v===null||v===undefined)b.pending++;
      else{var s=evalSt(k.target,k.direction,v);if(s==='hit')b.hit++;else if(s==='miss')b.miss++;else b.na++;}
    });
    return b;
  }
  function dashboardStats(){
    var deptStats={};
    DEPTS.forEach(function(d){var ks=kpisForDept(d);deptStats[d]={prev:bucket(ks,22),cur:bucket(ks,23)};});
    var msLeft=(function(){var end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);return end-now;})();
    return {prevLabel:PREV,curLabel:CUR,prev:bucket(KPIS,22),cur:bucket(KPIS,23),msLeft:msLeft,depts:DEPTS,deptStats:deptStats};
  }
  function yoyStats(dept){
    // % บรรลุรายเดือน 12 เดือน ปีนี้ vs ปีก่อน
    var ks=dept&&dept!=='ALL'?kpisForDept(dept):KPIS;
    function hitPct(idx){var b=bucket(ks,idx);var filled=b.hit+b.miss;return filled>0?Math.round(b.hit/filled*100):null;}
    var months=MONTHS.slice(12),thisY=[],lastY=[];
    for(var i=12;i<24;i++)thisY.push(hitPct(i));
    for(var j=0;j<12;j++)lastY.push(hitPct(j));
    return {months:months,thisYear:(now.getFullYear()+543),lastYear:(now.getFullYear()+542),thisYearData:thisY,lastYearData:lastY};
  }
  function heatmapStats(){
    var months=MONTHS.slice(12);
    var depts=DEPTS.map(function(d){var ks=kpisForDept(d);var data=[];for(var i=12;i<24;i++){var b=bucket(ks,i);var filled=b.hit+b.miss;data.push(filled>0?Math.round(b.hit/filled*100):null);}return {name:d,n:ks.length,data:data};});
    return {months:months,depts:depts};
  }

      {userId:'USR-002',name:'พว.สมศรี รักงาน (เดโม่)',email:'somsri@hospital.demo',dept:'PCT',position:'พยาบาลวิชาชีพ',role:'USER',status:'Active',kpis:'PCT-11,PCT-19,PCT-20'},

      {userId:'USR-004',name:'จนท.ไอที (เดโม่)',email:'admin@hospital.demo',dept:'IM',position:'นักวิชาการคอมพิวเตอร์',role:'ADMIN',status:'Active',kpis:'ALL'},
      {userId:'USR-005',name:'พว.ปราณี ระวัง (เดโม่)',email:'pranee@hospital.demo',dept:'RM',position:'หัวหน้าบริหารความเสี่ยง',role:'USER',status:'Active',kpis:'RM-1,RM-3'},
      {userId:'USR-006',name:'จนท.สิ่งแวดล้อม (เดโม่)',email:'manop@hospital.demo',dept:'ENV',position:'นักวิชาการสาธารณสุข',role:'USER',status:'Active',kpis:'ENV-3'},

  function auditLog(){
    var acts=[['WRITE_OK','PCT-10','บันทึกค่า','48.2','49.0'],['GENERATE_PDCA','PCT-11','สร้างร่าง PDCA','',''],['SMART_SUGGEST','','แนะนำ KPI ที่ควรดู','',''],['WRITE_OK','IC-4','บันทึกค่า','87','88'],['ANOMALY_ALERT','PCT-11','แจ้งเตือนค่าดิ่งผิดปกติ','','44'],['LINE_PUSH','','ส่งสรุปประจำสัปดาห์','',''],['WRITE_OK','IM-9','บันทึกค่า','90','92'],['ADD_KPI','HPH-1','เพิ่มตัวชี้วัดใหม่','',''],['EXPORT_EXCEL','','ส่งออกรายงาน Excel','','']];
    var entries=acts.map(function(a,i){var d=new Date(now-(i*3600000+1200000));return {time:d.toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}),action:a[0],email:(a[1]?'somchai@hospital.demo':'system@hospital.demo'),kpiId:a[1]||'—',detail:a[2],oldVal:a[3],newVal:a[4]};});

  function aiAnswer(question,email,key){
    var ok=KPIS.filter(function(k){return evalSt(k.target,k.direction,getLatest(k))==='hit';}).length;

    if(key==='dm_overview'||/เบาหวาน|dm|hba1c/i.test(question)){

    }else if(/ความดัน|bp|ht/i.test(question)){

    }else if(/ภาพรวม|executive|สรุป/i.test(question)){
      ans='📈 ภาพรวมคุณภาพเดือนนี้: บรรลุเป้า '+ok+'/'+KPIS.length+' ตัวชี้วัด ('+Math.round(ok/KPIS.length*100)+'%)\n\nจุดแข็ง: การล้างมือ (IC-4) และเวลารอพบแพทย์ ER ดีขึ้นต่อเนื่อง\nจุดที่ต้องเฝ้า: การคุมความดันโลหิต (PCT-11) ที่แนวโน้มแย่ลง — แนะนำเป็นวาระประชุม PCT';
    }else{
      ans='จากข้อมูลตัวชี้วัดล่าสุด บรรลุเป้า '+ok+'/'+KPIS.length+' ตัว ('+Math.round(ok/KPIS.length*100)+'%)\nตัวที่ควรให้ความสำคัญที่สุดคือ PCT-11 (ความดันโลหิต) ที่แนวโน้มลดลงต่อเนื่อง\n\n(นี่คือคำตอบตัวอย่างในโหมดสาธิต — ระบบจริงเรียก Google Gemini วิเคราะห์จากข้อมูลจริง)';
    }
    return {ok:true,answer:ans,meta:{model:'gemini-2.5-flash (demo)',cached:false}};
  }
  function getLatest(k){if(!k||!k.values)return'NA';for(var i=k.values.length-1;i>=0;i--){var v=k.values[i];if(v!==''&&v!=='NA'&&v!=null)return v;}return'NA';}
  function find(id){for(var i=0;i<KPIS.length;i++)if(KPIS[i].id===id)return KPIS[i];return null;}

  // ---- AI PDCA generator (mock of generatePDCA) — mirrors PDCAGenerator.js new format (22 มิ.ย.69):
  //      multi-layer FULL + 6-DNA SAR-short, KPI-aware from the demo data. No backend/AI call. ----
  function _pdcaCtx(k){
    var dirUp=(k.direction==='↑'||k.direction==='up');
    var tNum=parseFloat(String(k.target||'').replace(/[^0-9.\-]/g,''));
    var entries=[];
    for(var i=0;i<k.values.length;i++){
      var v=k.values[i];
      if(v===''||v===null||v===undefined||v==='NA')continue;
      var num=parseFloat(String(v).replace(/[^0-9.\-]/g,''));
      if(!isNaN(num))entries.push({label:k.months[i],num:num});
    }
    function fyOf(lbl){var p=String(lbl).split(' ');var mi=MN.indexOf(p[0]);var yr=parseInt(p[1],10);if(mi<0||isNaN(yr))return null;return (mi>=9)?(yr+1):yr;}
    function r1(x){return Math.round(x*10)/10;}
    var byFY={};
    entries.forEach(function(e){var fy=fyOf(e.label);if(fy!=null)(byFY[fy]=byFY[fy]||[]).push(e);});
    var roll=Object.keys(byFY).map(Number).sort(function(a,b){return a-b;}).map(function(fy){
      var arr=byFY[fy],s=0;arr.forEach(function(e){s+=e.num;});var avg=r1(s/arr.length);
      return {fy:'FY'+(fy-2500),fyNum:fy,n:arr.length,avg:avg,pass:isNaN(tNum)?null:(dirUp?(avg>=tNum):(avg<=tNum))};
    });
    return {entries:entries,roll:roll,dirUp:dirUp,tNum:tNum};
  }
  function pdcaGen(kpiId,email){
    var k=find(kpiId);
    if(!k)return {ok:false,msg:'ไม่พบ KPI: '+kpiId};
    var x=_pdcaCtx(k);
    if(!x.entries.length)return {ok:false,msg:'ยังไม่มีข้อมูลกรอก KPI นี้ — กรอกอย่างน้อย 1 ค่าแล้วลองใหม่'};
    var u=k.unit||'',dirUp=x.dirUp,tNum=x.tNum,roll=x.roll;
    var last=x.entries[x.entries.length-1];
    var lastFY=roll[roll.length-1],prevFY=roll.length>1?roll[roll.length-2]:null;
    var dirSym=k.direction||(dirUp?'↑':'↓');
    var pass=isNaN(tNum)?true:(dirUp?(last.num>=tNum):(last.num<=tNum));
    var verdict=pass?'บรรลุเป้า':'ต่ำกว่าเป้า';
    var ic=function(p){return p?'✅ ผ่าน':'❌ ต่ำกว่าเป้า';};
    var trend='ทรงตัวข้ามปี',improving=null;
    if(prevFY){var diff=Math.round((lastFY.avg-prevFY.avg)*10)/10;if(diff!==0){var up=diff>0;improving=dirUp?up:!up;trend=(up?'เพิ่มขึ้น':'ลดลง')+' ~'+Math.abs(diff)+u+' ('+prevFY.fy+'→'+lastFY.fy+')';}}
    var isCount=(u==='ราย');
    var fyTable=roll.map(function(r){return '| '+r.fy+' | '+r.avg+u+' | '+ic(r.pass)+' | n='+r.n+' |';}).join('\n');
    var ctxLine='ค่าล่าสุด ('+last.label+') = '+last.num+u+' — '+verdict+' (เป้า '+dirSym+' '+k.target+u+') · ระดับปีงบประมาณ'+trend+(improving===false?' ⚠️ ทิศทางสวนเป้า ควรเฝ้าระวังลำดับต้น':(pass?' ทิศทางเป็นไปตามเป้า':''))+'.';
    var full;
    if(pass){
      full='## '+k.id+' — '+k.name+'\n\n'+
        '### บริบท / ปัญหาที่พบ\n'+ctxLine+' ผลโดยรวมอยู่ในเกณฑ์ดี ประเด็นหลักคือ "รักษาระดับ" ไม่ให้ตกในรอบถัดไป\n\n'+
        '### KPI metrics (FY rollups)\n| FY | Value | Status | Note |\n|---|---|---|---|\n'+fyTable+'\n\nTarget: '+dirSym+' '+k.target+' '+u+'\n\n'+
        '### Root-cause analysis (multi-layer)\n'+
        '**Layer 1 — Surface**: '+k.name+' = '+last.num+u+' ผ่านเป้าต่อเนื่อง\n'+
        '**Layer 2 — Process**: ระบบติดตาม/บันทึกข้อมูลสม่ำเสมอทำงานได้ — ความเสี่ยงคือพึ่งตัวบุคคล ยังไม่เป็นระบบเต็มตัว\n'+
        '**Layer 3 — System**: ยังไม่มีกลไกเตือนเชิงระบบเมื่อค่าเข้าใกล้เป้า\n\n'+
        '#### Layer 1 PDCA\n- **Plan (P)**: คงผล '+dirSym+' '+k.target+u+' ทุกเดือนของ '+lastFY.fy+'\n- **Do (D)**: ทบทวนปัจจัยความสำเร็จในที่ประชุมฝ่าย + ทำเป็น checklist มาตรฐาน\n- **Check (C)**: ติดตามค่ารายเดือน + ตั้งธงเตือนเมื่อเข้าใกล้เป้า ±5%\n- **Act (A)**: หากค่าหล่นแตะเป้าพอดีหรือต่ำกว่า → เปิด mini-RCA ในเดือนนั้นทันที\n\n'+
        '#### Layer 3 PDCA\n- **Plan (P)**: แปลงวิธีที่ได้ผลเป็น SOP ลดการพึ่งบุคคล ภายใน '+lastFY.fy+'\n- **Do (D)**: เขียน SOP + ตั้งผู้รับผิดชอบสำรอง\n- **Check (C)**: audit การทำตาม SOP ทุกไตรมาส\n- **Act (A)**: หาก compliance SOP ต่ำกว่า 80% → อบรม/ทบทวนซ้ำ\n\n'+
        '### Next iteration\nทำผลให้คงที่เชิงระบบ (SOP + ธงเตือน) เพื่อกันค่าตกเมื่อผู้รับผิดชอบหลักไม่อยู่\n';
    }else{
      full='## '+k.id+' — '+k.name+'\n\n'+
        '### บริบท / ปัญหาที่พบ\n'+ctxLine+'\n\n'+
        '### KPI metrics (FY rollups)\n| FY | Value | Status | Note |\n|---|---|---|---|\n'+fyTable+'\n\nTarget: '+dirSym+' '+k.target+' '+u+'\n\n'+
        '### Root-cause analysis (multi-layer)\n'+
        '**Layer 1 — Surface**: '+k.name+' = '+last.num+u+' ห่างเป้า '+k.target+u+' '+(improving===false?'และแนวโน้มแย่ลง':'และยังไม่ถึงเป้า')+'\n'+
        '**Layer 2 — Process**: ขั้นตอนติดตาม/แก้ไขกลุ่มที่ยังไม่ถึงเป้ายังไม่ครอบคลุม (ทบทวนเคส + ติดตามต่อเนื่อง)\n'+
        '**Layer 3 — System**: ขาดระบบเตือน/ดึงข้อมูลกลับเข้า HOSxP + กำลังคนจำกัด (รพ. 30 เตียง)\n\n'+
        '#### Layer 1 PDCA\n- **Plan (P)**: ยก '+k.id+' ให้ถึง '+dirSym+' '+k.target+u+' ภายใน 2 ไตรมาส\n- **Do (D)**: คัดกลุ่มที่ยังไม่ถึงเป้า + วางแผนแก้รายกลุ่ม\n- **Check (C)**: ติดตามค่ารายเดือนเทียบเป้าในที่ประชุมฝ่าย\n- **Act (A)**: หากยังต่ำกว่าเป้า 2 เดือนติด → ยกเป็นวาระทีมนำ\n\n'+
        '#### Layer 2 PDCA\n- **Plan (P)**: ปิดช่องว่าง workflow ภายใน 30 วัน (มอบผู้รับผิดชอบชัดเจน)\n- **Do (D)**: จัดทำแนวทางติดตาม + อบรมทีมที่เกี่ยวข้อง\n- **Check (C)**: สุ่มตรวจการทำตามแนวทางทุกเดือน\n- **Act (A)**: หาก compliance ต่ำกว่า 80% → ทบทวนกระบวนการซ้ำ\n\n'+
        '#### Layer 3 PDCA\n- **Plan (P)**: เพิ่มระบบเตือน/บันทึกข้อมูลอัตโนมัติ ภายในปีงบ '+lastFY.fy+'\n- **Do (D)**: ตั้งรายงานเตือนรายเดือน + เชื่อมข้อมูลกลับ HOSxP\n- **Check (C)**: ทบทวนความครบถ้วนข้อมูลทุกไตรมาส\n- **Act (A)**: หากข้อมูลขาดเกิน 10% → ปรับวิธีจัดเก็บ\n\n'+
        '### Next iteration\nโฟกัสกลุ่มที่ยังไม่ถึงเป้า + ปิดช่องว่างเชิงระบบ แล้วประเมินซ้ำใน 1 ไตรมาส\n';
    }
    var fyRange=roll.length>1?(roll[0].fy+'–'+lastFY.fy):lastFY.fy;
    var ns=x.entries.map(function(e){return e.num;});
    var valSpan=(Math.round(Math.min.apply(null,ns)*10)/10)+'–'+(Math.round(Math.max.apply(null,ns)*10)/10);
    var interp=pass?'สะท้อนระบบงานที่เข้มแข็ง (ติดตามสม่ำเสมอ) แต่ต้องกันค่าตกเชิงระบบ':(improving===false?'ชี้ว่าแนวโน้มกำลังสวนเป้า ต้องหา root cause ของกลุ่มที่ยังไม่ถึงเป้า':'ชี้ว่ายังไม่ถึงเป้า ต้องเร่งกลุ่มที่ค้าง');
    var ctxRP=isCount?' บริบท รพ.ค่าย 30 เตียง — ตัวชี้วัดเชิงเหตุการณ์ (low-volume high-impact) ทุกเคสต้องทบทวน.':' บริบท รพ.ค่าย 30 เตียง — กรอบ low-volume high-impact.';
    var planNum=pass?('คงผล '+dirSym+' '+k.target+u):('ยกผลให้ถึง '+dirSym+' '+k.target+u+' ภายใน 2 ไตรมาส');
    var actThresh=isCount?('หากเกิน '+k.target+' ราย/เดือน → RCA ทุกเคส'):('หาก'+(dirUp?'ต่ำกว่า':'สูงกว่า')+' '+k.target+u+' ติดต่อกัน 2 เดือน → เปิด RCA');
    var sarShort='Definition: '+(k.formula||k.name)+'; ผลลัพธ์ '+valSpan+u+' (n='+x.entries.length+') ช่วง '+fyRange+' — '+verdict+' (เป้า '+dirSym+' '+k.target+u+')'+(trend!=='ทรงตัวข้ามปี'?' โดยระดับปี'+trend:'')+' '+interp+'.'+ctxRP+' **P:** '+planNum+' + ติดตามรายเดือน **D:** คัด/ทบทวนกลุ่มเป้าหมาย + มอบผู้รับผิดชอบชัดเจน **C:** track รายเดือนเทียบเป้า + RCA trigger **A:** '+actThresh;
    return {ok:true,kpiId:kpiId,full:full,sarShort:sarShort,engine:'claude',generatedAt:new Date().toISOString(),fromCache:false};
  }

  };

  function makeRunner(){
    var succ=null,fail=null;
    var api={withSuccessHandler:function(cb){succ=cb;return api;},withFailureHandler:function(cb){fail=cb;return api;}};
    Object.keys(FAKE).forEach(function(name){
      api[name]=function(){
        var args=arguments;
        setTimeout(function(){try{var r=FAKE[name].apply(null,args);if(succ)succ(r);}catch(e){if(fail)fail(e);else console.error(e);}},90);
        return api;
      };
    });
    // any unknown method → no-op success(null)
    return new Proxy(api,{get:function(t,p){if(p in t)return t[p];if(typeof p==='string')return function(){var args=arguments;setTimeout(function(){if(succ)succ(null);},60);return api;};return t[p];}});
  }
  window.google={script:{get run(){return makeRunner();},host:{close:function(){},setHeight:function(){}}}};
