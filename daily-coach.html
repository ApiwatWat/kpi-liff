<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 KPI วันนี้</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Prompt', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #FFF7F0 0%, #FBE5CD 100%);
    color: #3B2817;
    min-height: 100vh;
    padding: 16px;
    font-size: 14px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #9A3412;
  }
  .loading .spinner {
    font-size: 40px;
    animation: spin 1s linear infinite;
    display: inline-block;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .header {
    text-align: center;
    padding: 12px 0 20px;
  }
  .title {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #9A3412, #C2410C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #6B4A2B;
  }

  .user-card {
    background: white;
    border: 1px solid #F4D9BC;
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(194,65,12,0.06);
  }
  .user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C2410C, #D97706);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 16px;
  }
  .user-info .name { font-weight: 600; font-size: 15px; color: #3B2817; }
  .user-info .dept { font-size: 12px; color: #9A3412; }
  .tier-pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 8px;
    margin-left: 6px;
    background: rgba(194,65,12,0.1);
    color: #9A3412;
    vertical-align: middle;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: white;
    border: 1px solid #F4D9BC;
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-num.done { color: #639922; }
  .stat-num.pending { color: #C2410C; }
  .stat-num.total { color: #3B2817; }
  .stat-label { font-size: 11px; color: #6B4A2B; margin-top: 2px; }

  /* Section divider */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #6B4A2B;
    padding: 12px 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .count {
    font-size: 11px;
    background: rgba(194,65,12,0.1);
    color: #9A3412;
    padding: 1px 8px;
    border-radius: 8px;
  }

  /* Fallback notice (owns=0) */
  .fallback-notice {
    background: #FFFBEB;
    border: 1px solid #FCD34D;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: #854F0B;
    line-height: 1.5;
  }
  .fallback-notice .emoji { font-size: 18px; margin-right: 6px; }
  .fallback-notice strong { color: #C2410C; }

  .task-card {
    background: white;
    border: 1px solid #F4D9BC;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: opacity 0.3s;
  }
  .task-card.done { opacity: 0.5; border-color: #C0DD97; background: #EAF3DE; }
  .task-card.active { border: 2px solid #C2410C; box-shadow: 0 4px 12px rgba(194,65,12,0.12); }
  .task-card.snoozed { opacity: 0.7; background: #FBE5CD; }
  .task-card.locked {
    background: #F5F0E8;
    border-color: #D4C5B0;
    opacity: 0.85;
  }

  .task-badges {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 8px;
  }
  .badge.green { background: #EAF3DE; color: #3B6D11; }
  .badge.amber { background: #FAEEDA; color: #854F0B; }
  .badge.red { background: #FCEBEB; color: #A32D2D; }
  .badge.id { background: rgba(194,65,12,0.08); color: #9A3412; }
  .badge.ease { background: rgba(99,153,34,0.12); color: #3B6D11; }
  .badge.lock { background: #E5E0D5; color: #6B4A2B; }

  .task-name {
    font-size: 14px;
    font-weight: 600;
    color: #3B2817;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .task-meta {
    font-size: 11px;
    color: #6B4A2B;
    margin-bottom: 10px;
  }

  /* Lock info box (shared KPI completed by other) */
  .lock-info {
    background: rgba(107,74,43,0.06);
    border-left: 3px solid #D4C5B0;
    border-radius: 4px;
    padding: 8px 10px;
    margin-top: 8px;
    font-size: 12px;
    color: #6B4A2B;
  }
  .lock-info .lock-label {
    font-size: 10px;
    color: #9A3412;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .lock-info .lock-value {
    font-weight: 600;
    color: #3B2817;
    font-size: 14px;
  }
  .lock-info .lock-by {
    font-size: 11px;
    color: #6B4A2B;
    margin-top: 4px;
  }

  .ai-prefill {
    background: rgba(194,65,12,0.06);
    border: 1px dashed #EDB680;
    border-radius: 8px;
    padding: 8px 10px;
    margin: 8px 0;
    font-size: 12px;
    color: #9A3412;
  }
  .ai-prefill strong { color: #C2410C; font-size: 16px; }

  .input-group {
    margin: 10px 0;
  }
  .input-group label {
    font-size: 11px;
    color: #6B4A2B;
    display: block;
    margin-bottom: 4px;
  }
  .input-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #EDB680;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #FFF7F0;
    color: #3B2817;
  }
  .input-group input:focus {
    outline: none;
    border-color: #C2410C;
    box-shadow: 0 0 0 3px rgba(194,65,12,0.12);
  }
  .input-group input:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .task-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: linear-gradient(135deg, #C2410C, #D97706);
    color: white;
    box-shadow: 0 2px 8px rgba(194,65,12,0.3);
  }
  .btn.secondary {
    background: white;
    color: #9A3412;
    border: 1px solid #EDB680;
  }
  .btn.snooze {
    background: #FFEDD9;
    color: #6B4A2B;
    border: 1px solid #F4D9BC;
    flex: 0 0 auto;
    padding: 10px 14px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #6B4A2B;
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state .msg { font-size: 14px; font-weight: 500; color: #3B2817; }
  .empty-state .sub { font-size: 12px; margin-top: 6px; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #3B2817;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  .register-notice {
    background: white;
    border: 1px solid #F4D9BC;
    border-radius: 14px;
    padding: 20px;
    color: #3B2817;
    margin-top: 8px;
    box-shadow: 0 2px 8px rgba(194,65,12,0.06);
  }
  .register-notice h3 {
    font-size: 17px;
    margin-bottom: 10px;
    color: #9A3412;
    text-align: center;
  }
  .register-notice .intro {
    font-size: 13px;
    line-height: 1.6;
    color: #6B4A2B;
    text-align: center;
    margin-bottom: 16px;
  }
  .register-notice .help {
    margin-top: 14px;
    font-size: 11px;
    color: #6B4A2B;
    text-align: center;
    line-height: 1.5;
  }
  .register-notice code {
    background: rgba(194,65,12,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 11px;
    color: #3B2817;
  }
</style>
</head>
<body>

<div id="root">
  <div class="loading">
    <div class="spinner">🍑</div>
    <div style="margin-top: 12px;">กำลังโหลด...</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  var LIFF_ID = '2009680870-loqsVGDv';
  var API_URL = 'https://script.google.com/macros/s/AKfycbw_svUdey6l6A0uNVFAYEnF6pyPA_hWdVifQwX4zGY2BnW50SbtKoQ4UscNdOvDRTs/exec';

  var state = {
    profile: null,
    user: null,
    tasks: [],           // editable
    locked: [],          // read-only (shared done / fallback)
    fallback_mode: false,
    counts: { total: 0, pending: 0, done: 0, snoozed: 0, locked: 0 }
  };

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function apiCall(action, params) {
    var query = 'action=' + encodeURIComponent(action);
    for (var k in params) {
      if (params[k] !== undefined && params[k] !== null) {
        query += '&' + k + '=' + encodeURIComponent(params[k]);
      }
    }
    return fetch(API_URL + '?' + query)
      .then(function(r) { return r.json(); });
  }

  function init() {
    liff.init({ liffId: LIFF_ID })
      .then(function() {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        return liff.getProfile();
      })
      .then(function(profile) {
        if (!profile) return;
        state.profile = profile;
        return apiCall('register_line', {
          line_id: profile.userId,
          display_name: profile.displayName
        });
      })
      .then(function(result) {
        if (!result) return;
        if (result.status === 'pending_match') {
          renderPendingRegistration(result);
          return;
        }
        return loadTasks();
      })
      .catch(function(err) {
        console.error(err);
        document.getElementById('root').innerHTML =
          '<div class="loading">❌ Error: ' + err.toString() + '</div>';
      });
  }

  function loadTasks() {
    // v8.2: switched to get_tasks_v4 (owner-based + Show+Lock)
    return apiCall('get_tasks_v4', { line_id: state.profile.userId })
      .then(function(result) {
        if (!result.ok) {
          if (result.need_registration) {
            renderPendingRegistration({
              line_id_preview: state.profile.userId.substring(0, 8) + '...'
            });
            return;
          }
          throw new Error(result.error);
        }
        state.user = result.user;
        state.tasks = result.tasks || [];
        state.locked = result.locked || [];
        state.fallback_mode = !!result.fallback_mode;
        state.counts = result.counts || { total: 0, pending: 0, done: 0, snoozed: 0, locked: 0 };
        render();
      });
  }

  function render() {
    var html = '';
    html += renderHeader();
    html += renderUserCard();
    if (state.fallback_mode) {
      html += renderFallbackNotice();
    }
    html += renderStats();
    html += renderTasksSection();
    html += renderLockedSection();
    document.getElementById('root').innerHTML = html;
    bindEvents();
  }

  function renderHeader() {
    var today = new Date();
    var dateStr = today.toLocaleDateString('th-TH', {
      weekday: 'long', day: 'numeric', month: 'long'
    });
    return '<div class="header">' +
           '<div class="title">🎯 KPI วันนี้</div>' +
           '<div class="subtitle">' + dateStr + '</div>' +
           '</div>';
  }

  function renderUserCard() {
    var name = state.user.display_name || state.user.user_name || state.user.username || '?';
    var initial = String(name).charAt(0).toUpperCase();
    var dept = state.user.dept || '';
    var tier = state.user.tier_name || '';
    var owned = state.user.owned_count;

    var tierBadge = '';
    if (tier && tier !== 'none') {
      tierBadge = '<span class="tier-pill">' + escapeHtml(tier) + ' · ' + owned + ' KPI</span>';
    }

    return '<div class="user-card">' +
           '<div class="user-avatar">' + escapeHtml(initial) + '</div>' +
           '<div class="user-info">' +
           '<div class="name">' + escapeHtml(name) + tierBadge + '</div>' +
           '<div class="dept">ฝ่าย ' + escapeHtml(dept) + '</div>' +
           '</div>' +
           '</div>';
  }

  function renderFallbackNotice() {
    return '<div class="fallback-notice">' +
           '<span class="emoji">ℹ️</span>' +
           '<strong>โหมดดูอย่างเดียว</strong> — ระบบยังไม่ได้กำหนด KPI ให้คุณโดยตรง ' +
           'คุณเห็น KPI ของฝ่ายเพื่อติดตามสถานะ แต่ยังกรอกค่าไม่ได้ ' +
           'กรุณาติดต่อ admin เพื่อกำหนด KPI ที่ต้องรับผิดชอบ' +
           '</div>';
  }

  function renderStats() {
    return '<div class="stats-bar">' +
           '<div class="stat-box">' +
           '<div class="stat-num total">' + state.counts.total + '</div>' +
           '<div class="stat-label">ทั้งหมด</div>' +
           '</div>' +
           '<div class="stat-box">' +
           '<div class="stat-num pending">' + state.counts.pending + '</div>' +
           '<div class="stat-label">รอทำ</div>' +
           '</div>' +
           '<div class="stat-box">' +
           '<div class="stat-num done">' + state.counts.done + '</div>' +
           '<div class="stat-label">เสร็จ</div>' +
           '</div>' +
           '</div>';
  }

  function renderTasksSection() {
    if (state.fallback_mode) return ''; // No editable tasks in fallback

    if (state.tasks.length === 0) {
      return '<div class="empty-state">' +
             '<div class="emoji">🌴</div>' +
             '<div class="msg">วันนี้ไม่มี KPI ที่ต้องกรอก</div>' +
             '<div class="sub">พักผ่อนให้สบายใจครับ</div>' +
             '</div>';
    }
    var html = '<div class="section-title">📝 งานของฉัน <span class="count">' + state.tasks.length + '</span></div>';
    for (var i = 0; i < state.tasks.length; i++) {
      html += renderTaskCard(state.tasks[i], i, false);
    }
    return html;
  }

  function renderLockedSection() {
    if (state.locked.length === 0) return '';
    var sectionLabel = state.fallback_mode ? '👁️ KPI ของฝ่าย (ดูอย่างเดียว)' : '🔒 กรอกโดยผู้ร่วมรับผิดชอบ';
    var html = '<div class="section-title">' + sectionLabel + ' <span class="count">' + state.locked.length + '</span></div>';
    for (var i = 0; i < state.locked.length; i++) {
      html += renderTaskCard(state.locked[i], i, true);
    }
    return html;
  }

  function renderTaskCard(task, index, isLocked) {
    var cardClass = 'task-card';
    if (isLocked) cardClass += ' locked';
    else if (task.status === 'done') cardClass += ' done';
    else if (task.status === 'snoozed') cardClass += ' snoozed';
    else if (index === 0) cardClass += ' active';

    var aiPathLabel = task.ai_path === 'green' ? '🟢 AI พร้อม' :
                      task.ai_path === 'amber' ? '🟡 ผสม' : '🔴 กรอกเอง';
    var aiPathClass = task.ai_path || 'amber';

    var html = '<div class="' + cardClass + '" data-kpi="' + escapeHtml(task.kpi_id) + '">';

    // Badges
    html += '<div class="task-badges">';
    html += '<span class="badge ' + aiPathClass + '">' + aiPathLabel + '</span>';
    html += '<span class="badge id">' + escapeHtml(task.kpi_id) + '</span>';
    html += '<span class="badge ease">ง่าย ' + task.ease + '/5</span>';
    if (!isLocked && task.status === 'done') html += '<span class="badge green">✓ เสร็จแล้ว</span>';
    if (!isLocked && task.status === 'snoozed') html += '<span class="badge amber">⏰ เลื่อน</span>';
    if (isLocked && task.lock_reason === 'completed_by_other') html += '<span class="badge lock">🔒 ผู้อื่นกรอกแล้ว</span>';
    if (isLocked && task.lock_reason === 'fallback_no_ownership') html += '<span class="badge lock">👁️ ดูอย่างเดียว</span>';
    html += '</div>';

    html += '<div class="task-name">' + escapeHtml(task.kpi_name) + '</div>';
    html += '<div class="task-meta">' + escapeHtml(task.timing_group || '') + '</div>';

    // Read-only view (Show+Lock / fallback)
    if (isLocked) {
      if (task.lock_reason === 'completed_by_other' && task.completed_value !== '') {
        html += '<div class="lock-info">';
        html += '<div class="lock-label">ค่าที่กรอกแล้ว</div>';
        html += '<div class="lock-value">' + escapeHtml(task.completed_value) + '</div>';
        if (task.completed_by) {
          html += '<div class="lock-by">โดย ' + escapeHtml(task.completed_by) + '</div>';
        }
        html += '</div>';
      }
      html += '</div>'; // close task-card
      return html;
    }

    // Editable view
    if (task.status !== 'done') {
      if (task.ai_pre_filled) {
        html += '<div class="ai-prefill">🤖 AI คำนวณให้: <strong>' + escapeHtml(task.ai_pre_filled) + '</strong></div>';
      }
      html += '<div class="input-group">';
      html += '<label>ค่าที่จะบันทึก</label>';
      html += '<input type="text" id="value-' + escapeHtml(task.kpi_id) + '" placeholder="กรอกค่า เช่น 48.2%" value="' + escapeHtml(task.target_value || '') + '">';
      html += '</div>';
      html += '<div class="task-actions">';
      html += '<button class="btn primary" data-action="confirm" data-kpi="' + escapeHtml(task.kpi_id) + '">✓ ยืนยัน</button>';
      html += '<button class="btn snooze" data-action="snooze" data-kpi="' + escapeHtml(task.kpi_id) + '">⏰</button>';
      html += '</div>';
    } else {
      // Done by me — show value
      if (task.target_value || task.completed_value) {
        html += '<div class="lock-info">';
        html += '<div class="lock-label">ค่าที่กรอก</div>';
        html += '<div class="lock-value">' + escapeHtml(task.completed_value || task.target_value) + '</div>';
        html += '</div>';
      }
    }

    html += '</div>';
    return html;
  }

  /**
   * Render registration form — kept from v8.1 Sprint 2 (unchanged)
   */
  function renderPendingRegistration(info) {
    var displayName = (state.profile && state.profile.displayName) || '';
    var initial = (displayName || '?').charAt(0).toUpperCase();

    var html = '<div class="header">';
    html += '<div class="title">🔗 ลงทะเบียน</div>';
    html += '<div class="subtitle">เชื่อมต่อ LINE กับบัญชี KPI</div>';
    html += '</div>';

    html += '<div class="user-card">';
    html += '<div class="user-avatar">' + initial + '</div>';
    html += '<div class="user-info">';
    html += '<div class="name">' + escapeHtml(displayName) + '</div>';
    html += '<div class="dept">LINE User</div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="register-notice">';
    html += '<h3>👋 ยินดีต้อนรับครับ</h3>';
    html += '<div class="intro">กรุณากรอก email ที่ admin ลงทะเบียนไว้ในระบบ<br>เพื่อเชื่อม LINE กับบัญชี KPI ของคุณ</div>';

    html += '<div class="input-group">';
    html += '<label>Email ของคุณ</label>';
    html += '<input type="email" id="register-email" placeholder="your-email@hospital.mil.th" autocomplete="email" inputmode="email">';
    html += '</div>';

    html += '<button class="btn primary" id="btn-register" style="width: 100%; margin-top: 6px;">🔗 ลงทะเบียน</button>';

    html += '<div class="help">หากไม่ทราบ email กรุณาติดต่อ admin<br>';
    html += '<span style="opacity: 0.7;">LINE ID: <code>' + (state.profile ? state.profile.userId.substring(0, 8) + '...' : 'N/A') + '</code></span>';
    html += '</div>';
    html += '</div>';

    document.getElementById('root').innerHTML = html;

    var btn = document.getElementById('btn-register');
    var input = document.getElementById('register-email');
    if (btn) btn.addEventListener('click', submitRegistration);
    if (input) {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') submitRegistration();
      });
      setTimeout(function() { input.focus(); }, 300);
    }
  }

  function submitRegistration() {
    var emailInput = document.getElementById('register-email');
    var btn = document.getElementById('btn-register');
    if (!emailInput || !btn) return;

    var email = emailInput.value.trim().toLowerCase();

    if (!email) {
      showToast('⚠️ กรุณากรอก email');
      emailInput.focus();
      return;
    }
    if (email.indexOf('@') < 0 || email.indexOf('.') < 0) {
      showToast('⚠️ รูปแบบ email ไม่ถูกต้อง');
      emailInput.focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = 'กำลังลงทะเบียน...';
    emailInput.disabled = true;

    apiCall('register_line_by_email', {
      line_id: state.profile.userId,
      display_name: state.profile.displayName,
      email: email
    }).then(function(r) {
      if (r.ok) {
        var greetName = r.user_name || email;
        showToast('✅ ลงทะเบียนสำเร็จ ยินดีต้อนรับ ' + greetName);
        setTimeout(function() {
          loadTasks().catch(function(err) {
            console.error('loadTasks after register failed:', err);
            showToast('⚠️ โหลดงานไม่สำเร็จ ลอง refresh');
          });
        }, 1500);
      } else {
        var msg = r.message || r.error || 'เกิดข้อผิดพลาด';
        showToast('❌ ' + msg);
        btn.disabled = false;
        btn.textContent = '🔗 ลงทะเบียน';
        emailInput.disabled = false;
        emailInput.focus();
      }
    }).catch(function(err) {
      console.error('submitRegistration error:', err);
      showToast('❌ เกิดข้อผิดพลาด ลองอีกครั้ง');
      btn.disabled = false;
      btn.textContent = '🔗 ลงทะเบียน';
      emailInput.disabled = false;
    });
  }

  function bindEvents() {
    var buttons = document.querySelectorAll('.btn[data-action]');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener('click', handleButton);
    }
  }

  function handleButton(e) {
    var btn = e.currentTarget;
    var action = btn.getAttribute('data-action');
    var kpiId = btn.getAttribute('data-kpi');

    btn.disabled = true;
    var originalText = btn.textContent;
    btn.textContent = '...';

    if (action === 'confirm') {
      var input = document.getElementById('value-' + kpiId);
      var value = input ? input.value.trim() : '';
      if (!value) {
        showToast('⚠️ กรุณากรอกค่าก่อน');
        btn.disabled = false;
        btn.textContent = originalText;
        return;
      }
      // v8.2: switched to confirm_task_v4
      apiCall('confirm_task_v4', {
        line_id: state.profile.userId,
        kpi_id: kpiId,
        value: value
      }).then(function(r) {
        if (r.ok) {
          var msg = '✅ บันทึกแล้ว: ' + kpiId;
          if (r.shared_cleared > 0) {
            msg += ' (เคลียร์ให้ผู้ร่วมรับผิดชอบ ' + r.shared_cleared + ' คน)';
          }
          showToast(msg);
          setTimeout(loadTasks, 800);
        } else {
          var errMsg = r.error || 'error';
          if (r.reason === 'already_completed' && r.completed_by) {
            errMsg = 'KPI นี้ถูกกรอกแล้วโดย ' + r.completed_by;
          }
          showToast('❌ ' + errMsg);
          btn.disabled = false;
          btn.textContent = originalText;
          // Reload to sync state (maybe shared-done)
          setTimeout(loadTasks, 1500);
        }
      }).catch(function(err) {
        console.error('confirm error:', err);
        showToast('❌ เกิดข้อผิดพลาด');
        btn.disabled = false;
        btn.textContent = originalText;
      });
    } else if (action === 'snooze') {
      // v8.2: switched to snooze_task_v4 (fixed bug, per-user only)
      apiCall('snooze_task_v4', {
        line_id: state.profile.userId,
        kpi_id: kpiId
      }).then(function(r) {
        if (r.ok) {
          showToast('⏰ เลื่อนไปพรุ่งนี้แล้ว');
          setTimeout(loadTasks, 800);
        } else {
          showToast('❌ ' + (r.error || 'error'));
          btn.disabled = false;
          btn.textContent = originalText;
        }
      }).catch(function(err) {
        console.error('snooze error:', err);
        showToast('❌ เกิดข้อผิดพลาด');
        btn.disabled = false;
        btn.textContent = originalText;
      });
    }
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  init();
</script>

</body>
</html>
